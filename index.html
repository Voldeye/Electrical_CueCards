<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>HANDA Cue Cards</title>
<style>
  :root{
    --ink:#12242e;
    --paper:#f3ede0;
    --card:#fbf7ee;
    --line:#d8cdb6;
    --copper:#b45733;
    --copper-soft:#e8d3c4;
    --teal:#1f6b6b;
    --right:#1f7a4d;
    --right-soft:#d6ecdc;
    --muted:#6d6754;
    --shadow:rgba(30,40,45,.16);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:radial-gradient(120% 80% at 50% -10%, #f8f2e6 0%, var(--paper) 55%);
    color:var(--ink);
    font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    min-height:100vh;min-height:100dvh;
    overflow-x:hidden;
  }
  .hidden{display:none !important;}

  /* ================= HOME / CHAPTER LIST ================= */
  #home{padding:34px 20px calc(30px + env(safe-area-inset-bottom));max-width:560px;margin:0 auto;}
  .brand{
    font-family:"SF Mono",ui-monospace,Menlo,monospace;
    font-size:12px;letter-spacing:.34em;text-transform:uppercase;
    color:var(--copper);margin:0 0 6px;
  }
  #home h1{margin:0;font-size:30px;font-weight:600;letter-spacing:-.01em;}
  #home .sub{color:var(--muted);font-size:15px;margin:8px 0 26px;line-height:1.4;}
  .spark{width:54px;height:3px;margin:14px 0 0;border-radius:2px;
    background:linear-gradient(90deg,var(--copper),var(--teal));}
  .chapter-list{display:flex;flex-direction:column;gap:14px;margin-top:26px;}
  .ch-card{
    text-align:left;width:100%;cursor:pointer;
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:18px 18px;display:flex;align-items:center;gap:16px;
    box-shadow:0 6px 18px var(--shadow);
    transition:transform .15s ease, box-shadow .15s ease;
    font-family:inherit;color:var(--ink);
  }
  .ch-card:active{transform:scale(.985);}
  .ch-index{
    flex:0 0 auto;width:52px;height:52px;border-radius:14px;
    background:linear-gradient(135deg,var(--copper),var(--teal));
    color:#fff;display:flex;align-items:center;justify-content:center;
    font-family:"SF Mono",ui-monospace,Menlo,monospace;font-size:15px;font-weight:700;
    letter-spacing:.02em;
  }
  .ch-body{flex:1;min-width:0;}
  .ch-name{font-size:18px;font-weight:600;line-height:1.2;}
  .ch-meta{font-size:13px;color:var(--muted);margin-top:3px;
    font-family:"SF Mono",ui-monospace,Menlo,monospace;}
  .ch-arrow{color:var(--copper);font-size:22px;flex:0 0 auto;}

  /* ================= DECK / CARDS ================= */
  #deck{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;}
  .topbar{
    display:flex;align-items:center;gap:12px;
    padding:16px 18px 8px;
  }
  .back-btn{
    font-family:"SF Mono",ui-monospace,Menlo,monospace;font-size:14px;
    background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:9px 13px;cursor:pointer;color:var(--ink);
  }
  .deck-title{font-size:16px;font-weight:600;flex:1;min-width:0;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .jump-btn{
    font-family:"SF Mono",ui-monospace,Menlo,monospace;font-size:14px;
    background:var(--ink);color:var(--paper);border:none;border-radius:10px;
    padding:9px 13px;cursor:pointer;
  }
  .meta{display:flex;align-items:center;padding:6px 20px 4px;}
  .counter{font-family:"SF Mono",ui-monospace,Menlo,monospace;font-size:13px;color:var(--muted);}
  .counter b{color:var(--ink);font-size:16px;}
  .track{flex:1;height:4px;margin:0 14px;border-radius:2px;background:var(--copper-soft);overflow:hidden;}
  .track > div{height:100%;width:0;border-radius:2px;
    background:linear-gradient(90deg,var(--copper),var(--teal));transition:width .25s ease;}

  .stage{flex:1;display:flex;align-items:center;justify-content:center;padding:8px 18px 4px;perspective:1400px;}
  .card{position:relative;width:100%;max-width:440px;min-height:54vh;
    transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,.15,.2,1);cursor:pointer;}
  .card.flipped{transform:rotateY(180deg);}
  .face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    background:var(--card);border:1px solid var(--line);border-radius:20px;
    box-shadow:0 14px 34px var(--shadow),0 2px 0 #fff inset;
    padding:22px 20px;display:flex;flex-direction:column;overflow:hidden;}
  .face::before{content:"";position:absolute;top:0;left:0;right:0;height:5px;
    background:linear-gradient(90deg,var(--copper),var(--teal));}
  .qnum{font-family:"SF Mono",ui-monospace,Menlo,monospace;font-size:12px;letter-spacing:.14em;
    color:var(--copper);text-transform:uppercase;margin-bottom:12px;}
  .qtext{font-size:19px;line-height:1.32;font-weight:500;margin-bottom:16px;}
  .options{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:9px;overflow-y:auto;}
  .opt{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--line);border-radius:12px;
    padding:11px 13px;background:#fff;font-size:15.5px;line-height:1.28;transition:all .2s ease;}
  .opt .lbl{font-family:"SF Mono",ui-monospace,Menlo,monospace;font-weight:700;color:var(--teal);flex:0 0 auto;min-width:16px;}
  .opt.correct{background:var(--right-soft);border-color:var(--right);}
  .opt.correct .lbl{color:var(--right);}
  .opt.correct::after{content:"✓";margin-left:auto;color:var(--right);font-weight:700;align-self:center;}
  .back-tag{font-family:"SF Mono",ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:.2em;
    text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
  .answer-big{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:16px;text-align:center;}
  .badge{width:104px;height:104px;border-radius:50%;background:var(--right-soft);border:3px solid var(--right);
    display:flex;align-items:center;justify-content:center;font-size:52px;font-weight:700;color:var(--right);
    font-family:"SF Mono",ui-monospace,Menlo,monospace;}
  .answer-text{font-size:20px;line-height:1.35;font-weight:500;max-width:90%;}
  .back-face{transform:rotateY(180deg);}
  .tap-hint{text-align:center;font-size:12px;color:var(--muted);
    font-family:"SF Mono",ui-monospace,Menlo,monospace;letter-spacing:.05em;margin-top:10px;}

  .nav{display:flex;gap:12px;padding:12px 20px calc(18px + env(safe-area-inset-bottom));max-width:480px;margin:0 auto;width:100%;}
  .nav button{flex:1;font-family:inherit;font-size:16px;font-weight:600;padding:15px;border-radius:14px;cursor:pointer;
    border:1px solid var(--line);background:var(--card);color:var(--ink);transition:all .16s ease;}
  .nav button:active{transform:scale(.97);}
  .nav button.primary{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .nav button:disabled{opacity:.4;cursor:default;}

  /* ================= JUMP OVERLAY ================= */
  .overlay{position:fixed;inset:0;background:rgba(18,36,46,.55);display:flex;align-items:center;justify-content:center;
    padding:24px;z-index:50;}
  .sheet{background:var(--card);border-radius:20px;padding:24px;width:100%;max-width:360px;
    box-shadow:0 20px 50px rgba(0,0,0,.3);}
  .sheet h3{margin:0 0 4px;font-size:19px;}
  .sheet p{margin:0 0 16px;font-size:13px;color:var(--muted);}
  .sheet input{width:100%;font-size:20px;font-family:"SF Mono",ui-monospace,monospace;text-align:center;
    padding:12px;border:1px solid var(--line);border-radius:12px;background:#fff;margin-bottom:16px;}
  .sheet-actions{display:flex;gap:10px;}
  .sheet-actions button{flex:1;font-family:inherit;font-size:15px;font-weight:600;padding:12px;border-radius:12px;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--ink);}
  .sheet-actions button.go{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .jump-err{color:var(--copper);font-size:13px;min-height:16px;margin:-8px 0 8px;text-align:center;}

  /* notice banner when a searched Q was skipped */
  .notice{
    max-width:440px;margin:0 auto 2px;width:100%;
    background:var(--copper-soft);border:1px solid var(--copper);
    color:#7a3218;border-radius:12px;padding:9px 14px;
    font-size:13.5px;line-height:1.3;
    display:flex;align-items:center;gap:8px;
  }
  .notice.hidden{display:none;}
  .notice b{font-family:"SF Mono",ui-monospace,Menlo,monospace;}

  @media (prefers-reduced-motion: reduce){.card{transition:none;}}
</style>
</head>
<body>

  <!-- ============ HOME ============ -->
  <section id="home">
    <p class="brand">Electrical Engineering · Objective</p>
    <h1>HANDA Cue Cards</h1>
    <p class="sub">Tap a chapter to start. Flip each card to reveal the answer.</p>
    <div class="spark"></div>
    <div class="chapter-list" id="chapterList"></div>
  </section>

  <!-- ============ DECK ============ -->
  <section id="deck" class="hidden">
    <div class="topbar">
      <button class="back-btn" id="backBtn">‹ Chapters</button>
      <div class="deck-title" id="deckTitle"></div>
      <button class="jump-btn" id="jumpBtn">Go to Q</button>
    </div>
    <div class="meta">
      <span class="counter"><b id="cur">1</b> / <span id="total">0</span></span>
      <div class="track"><div id="fill"></div></div>
    </div>
    <div class="notice hidden" id="notice"></div>
    <div class="stage">
      <div class="card" id="card">
        <div class="face front-face">
          <div class="qnum" id="qnum">Q1</div>
          <div class="qtext" id="qtext"></div>
          <ul class="options" id="options"></ul>
        </div>
        <div class="face back-face">
          <div class="back-tag">Answer</div>
          <div class="answer-big">
            <div class="badge" id="ansBadge">A</div>
            <div class="answer-text" id="ansText"></div>
          </div>
          <div class="tap-hint">tap to flip back</div>
        </div>
      </div>
    </div>
    <div class="nav">
      <button id="prevBtn">‹ Prev</button>
      <button id="nextBtn" class="primary">Next ›</button>
    </div>
  </section>

  <!-- ============ JUMP OVERLAY ============ -->
  <div class="overlay hidden" id="jumpOverlay">
    <div class="sheet">
      <h3>Jump to question</h3>
      <p>Enter a question number from this chapter.</p>
      <input type="number" id="jumpInput" inputmode="numeric" placeholder="e.g. 45">
      <div class="jump-err" id="jumpErr"></div>
      <div class="sheet-actions">
        <button id="jumpCancel">Cancel</button>
        <button class="go" id="jumpGo">Go</button>
      </div>
    </div>
  </div>

<script>
/* =====================================================================
   CHAPTER DATA  —  EDIT ONLY THIS SECTION TO ADD CHAPTERS
   ---------------------------------------------------------------------
   Copy one { ... } block, paste it after the last one (mind the comma),
   and fill in your questions. Card format:
     { n:<question number shown>, q:"the question",
       opts:["option A","option B","option C","option D"],
       a:<index of correct answer: 0=A, 1=B, 2=C, 3=D> }
   ===================================================================== */
const CHAPTERS = [

{
  id:"ch1", name:"Electric Current and Ohm's Law", num:1,
  cards:[
    {n:1,  q:'Resistivity of a wire depends on:', opts:["length","material","cross section area","none of the above"], a:1},
    {n:2,  q:'When n resistances each of value r are connected in parallel, the resultant resistance is x. When these n resistances are connected in series, total resistance is:', opts:["nx","rnx","x/n","n²x"], a:3},
    {n:4,  q:"Kirchhoff's second law is based on law of conservation of:", opts:["charge","energy","momentum","mass"], a:1},
    {n:5,  q:'The diameter of the nucleus of an atom is of the order of:', opts:["10⁻³¹ m","10⁻²⁵ m","10⁻²¹ m","10⁻¹⁴ m"], a:3},
    {n:9,  q:'Ampere second could be the unit of:', opts:["power","charge","energy","watt"], a:1},
    {n:10, q:'Which of the following is not the same as watt?', opts:["joule/sec","amperes × volts","(amperes)² × ohm","amperes/volt"], a:3},
    {n:11, q:'One kilowatt hour of electrical energy is the same as:', opts:["36 × 10⁵ watts","36 × 10⁵ ergs","36 × 10⁵ joules","36 × 10⁵ B.T.U."], a:2},
    {n:14, q:'The value of [100 (kilo ampere) × (micro ampere)] ÷ [100 milli ampere × 10 ampere] is given by:', opts:["0.001 A","0.1 A","1 A","10 A"], a:2},
    {n:15, q:'A circuit contains two un-equal resistances in parallel:', opts:["current is same in both","large current flows in larger resistor","potential difference across each is same","smaller resistance has smaller conductance"], a:2},
    {n:16, q:'Conductance is expressed in terms of:', opts:["ohm/m","m/ohm","mho/m","mho"], a:3},
    {n:17, q:'Which of the following could be the value of resistivity of copper?', opts:["1.7 × 10⁻⁸ ohm-cm","1.7 × 10⁻⁶ ohm-cm","1.6 × 10⁻⁵ ohm-cm","1.7 × 10⁻⁴ ohm-cm"], a:1},
    {n:23, q:'Four identical resistors are first connected in parallel and then in series. The resultant resistance of the first combination to the second will be:', opts:["1/16 times","1/4 times","4 times","16 times"], a:0},
    {n:25, q:'When P = Power, V = Voltage, I = Current, R = Resistance, G = Conductance, which of the following relation is incorrect?', opts:["V = √(PR)","P = V²G","G = P/I²","I = √(P/R)"], a:2},

    {n:33, q:'Five resistances are connected as shown in Fig. 6. The equivalent resistance between the points A and B will be:', opts:["35 ohms","25 ohms","15 ohms","5 ohms"], a:3},
    {n:36, q:"Ohm's law is not applicable to:", opts:["dc circuits","high currents","small resistors","semi-conductors"], a:3},
    {n:39, q:'The current in a 4 ohm resistor will be:', opts:["2.1 A","2.7 A","3.0 A","3.5 A"], a:3},
    {n:40, q:'Least current will flow through:', opts:["25 ohm resistor","18 ohm resistor","10 ohm resistor","5 ohm resistor"], a:0},
    {n:41, q:'Total power loss in the circuit is:', opts:["10 W","50.2 W","205 W","410 W"], a:2},
    {n:43, q:'Specific resistance of a substance is measured in:', opts:["ohms","mhos","ohm-cm","cm/ohm"], a:2},
    {n:44, q:'A wire of resistance R has its length and cross-section both doubled. Its resistance will become:', opts:["4R","2R","R","R/4"], a:2},
    {n:45, q:"Ohm's law is not applicable in all the following cases except:", opts:["Electrolysis","Arc lamps","Insulators","Vacuum radio valves"], a:2},
    {n:46, q:'The element of electric heater is made of:', opts:["copper","steel","carbon","nichrome"], a:3},
    {n:48, q:'Which of the following figures represents the effect of temperature on resistance for copper?', opts:["figure A","figure B","figure C","figure D"], a:0},
    {n:49, q:'Three elements having conductance G₁, G₂ and G₃ are connected in parallel. Their combined conductance will be:', opts:["1/(1/G₁+1/G₂+1/G₃)","(G₁G₂+G₂G₃+G₃G₁)/(G₁+G₂+G₃)","1/(G₁+G₂+G₃)","G₁+G₂+G₃"], a:3},
    {n:50, q:'The variation of resistance of iron and some alloys with temperature is shown in figure. The variation of carbon will be represented by:', opts:["curve A","curve B","curve C","curve D"], a:1},
    {n:51, q:'Curves A and B represent the properties for materials which have:', opts:["low resistance","low conductance","negative resistance","positive temperature coefficient"], a:3},

    {n:69, q:'Two coils connected in series have:', opts:["higher tolerance","same current through both","combined resistance equal to sum","larger power rating"], a:3},
    {n:71, q:'A fuse is always installed in a circuit in:', opts:["Series","Parallel","series or parallel","none of the above"], a:0},

    {n:90, q:'Which of the following statements is necessarily correct?', opts:["40 W bulbs will always glow at full brightness","100 W bulb will always glow at full brightness","Whatever be the position of keys, at least one 40 W bulb will always glow","Whenever current flows through the circuit, 100 W bulb will always glow"], a:3},
    {n:91, q:'40 W bulb A will be least bright when:', opts:["only keys k₁ and k₂ are open","only keys k₂ is open","only keys k₃ is open","all keys are closed"], a:0},
    {n:92, q:'The power consumption of the circuit will be maximum when:', opts:["key k₁ and k₃ are closed and k₂ is open","key k₁ is closed, k₂ and k₃ are open","key k₁ and k₂ are closed and k₃ is open","all the keys are closed"], a:0},
    {n:93, q:'Which of the following lamps will have least resistance at room temperature?', opts:["200 W, 220 V","100 W, 220 V","60 W, 220 V","25 W, 220 V"], a:0},
    {n:94, q:'Filaments of electric bulbs are usually made of:', opts:["Nichrome","Tungsten","Copper","Carbon"], a:1},
    {n:96, q:'Which resistor will be physically larger in size?', opts:["10 Ω, 50 W","100 Ω, 10 W","1 kΩ, 1 W","10 MΩ, ½ W"], a:0},
    {n:97, q:'Four resistances R₁, R₂, R₃ and R₄ are connected in series against 220 V supply. The resistances are such that R₁ > R₂ > R₃ > R₄. The least power consumption will be in:', opts:["resistor R₁","resistor R₂","resistor R₃","resistor R₄"], a:3},

    {n:100,q:'When current flows through heater coil it glows but supply wiring does not glow because:', opts:["supply wiring is covered with insulation layer","current through supply line flows at slower speed","supply wires are made of superior material","resistance of heater coil is more than that of supply wires"], a:3},

    {n:115,q:'The unit of conductivity is:', opts:["mho/metre","mho/sq. m","ohm/metre","ohm/sq. m"], a:0},
    {n:118,q:'According to Joule law heat produced by a current I while flowing through a material of resistance R for a length of time T, is proportional to:', opts:["T only","(RT)","(IRT)","(I²RT)"], a:3},

    {n:121,q:'In the colour code number 3 is represented by:', opts:["blue","orange","grey","violet"], a:1},

    {n:50, q:'In a series RC circuit as frequency increases:', opts:["current increases","current decreases","remains unaltered","becomes zero"], a:0},
    {n:51, q:'The minimum and maximum values of power factor in an a.c. circuit are:', opts:["0 and 1","1 and ∞","0 and ∞","0.1 and 1"], a:0},
    {n:73, q:'The least current will pass through:', opts:["resistance","inductance","capacitance","all equally"], a:0},
    {n:74, q:'A low-pass filter has L = 20 mH and C = 0.12 μF. Input signal 2V p-p at 5 kHz; unwanted noise 0.2 V p-p at 50 Hz. The signal-to-noise ratio at the input is:', opts:["2","4","6","10"], a:3},
    {n:75, q:'The signal-to-noise ratio at the output is:', opts:["17","170","1700","17000"], a:2},
    {n:76, q:'A high-pass filter has R = 2 kΩ. The lowest input frequency to be passed is 7.5 kHz. The value of suitable coupling capacitor must be:', opts:["0.1 pF","1 pF","0.1 μF","1 μF"], a:2},
    {n:77, q:'The attenuation of the filter for 60-Hz frequencies will be:', opts:["0.0075","0.075","0.75","7.5"], a:1},
    {n:86, q:'When a.c. flows through an inductance (no resistance), then the current:', opts:["leads e.m.f. by π/2","lags e.m.f. by π/2","is inphase with e.m.f.","none of the above"], a:1},
    {n:93, q:'When a.c. flows through a capacitor, then the current:', opts:["leads e.m.f. by π/2","lags e.m.f. by π/2","is inphase with e.m.f.","none of the above"], a:0},
    {n:95, q:'In a sine wave, the slope is constant:', opts:["between 0° and 90°","between 90° and 270°","between 135° and 225°","no where"], a:3},
    {n:101,q:'The shape of impedance versus frequency curve for a parallel resonance circuit is of the shape shown in:', opts:["figure A","figure B","figure C","figure D"], a:0},
    {n:106,q:'The bandwidth of the circuit can be doubled, while maintaining resonance frequency unaltered, by:', opts:["increasing L to 200 mH","reducing C to 0.05 μF","reducing R to 25 Ω","increasing R to 100 Ω"], a:3},
    {n:107,q:'In the circuit what will happen when L is increased?', opts:["Bandwidth will increase","Resonance frequency will increase","Q will decrease","Resonance frequency will decrease"], a:3},
    {n:109,q:'Which of the following will not change when input frequency is changed?', opts:["Bandwidth","Resonance frequency","Q factor","Inductance"], a:3},
    {n:110,q:'Any reduction in the value of R will not change:', opts:["Resonance frequency","Bandwidth","Q","All of the above"], a:0},
    {n:111,q:'Which of the following will not change when E is increased to 24 volts?', opts:["Q","Bandwidth","Resonance frequency","All of the above"], a:3},
    {n:115,q:'The current through conductor will be:', opts:["40 mA","40 μA","mA","4 μA"], a:3},
    {n:118,q:'An alternating e.m.f. is applied to a pure inductance such that inductive reactance is 10 Ω. If the frequency of a.c. is doubled, the reactance will become:', opts:["5 Ω","10 Ω","15 Ω","20 Ω"], a:3},
    {n:119,q:'An alternating e.m.f. is applied to a pure capacitance such that the capacitive reactance is 10 Ω. If the frequency of a.c. is doubled, the reactance will become:', opts:["5 Ω","10 Ω","15 Ω","20 Ω"], a:0},
    {n:120,q:'An inductor:', opts:["allows a.c. to pass but blocks d.c.","allows d.c. to pass but blocks a.c.","allows both a.c. and d.c. to pass","blocks d.c."], a:2}
  ]
}
];
/* ===================== END OF CHAPTER DATA ===================== */

const LETTERS = ['A','B','C','D'];
let chapIdx = 0, idx = 0;

const home       = document.getElementById('home');
const deck       = document.getElementById('deck');
const chapterList= document.getElementById('chapterList');
const deckTitle  = document.getElementById('deckTitle');
const card       = document.getElementById('card');
const qnumEl     = document.getElementById('qnum');
const qtextEl    = document.getElementById('qtext');
const optsEl     = document.getElementById('options');
const badgeEl    = document.getElementById('ansBadge');
const ansTxt     = document.getElementById('ansText');
const curEl      = document.getElementById('cur');
const totalEl    = document.getElementById('total');
const fillEl     = document.getElementById('fill');
const prevBtn    = document.getElementById('prevBtn');
const nextBtn    = document.getElementById('nextBtn');
const backBtn    = document.getElementById('backBtn');
const jumpBtn    = document.getElementById('jumpBtn');
const jumpOverlay= document.getElementById('jumpOverlay');
const jumpInput  = document.getElementById('jumpInput');
const jumpErr    = document.getElementById('jumpErr');
const notice     = document.getElementById('notice');

function buildHome(){
  chapterList.innerHTML='';
  CHAPTERS.forEach((ch,i)=>{
    const b=document.createElement('button');
    b.className='ch-card';
    b.innerHTML =
      '<div class="ch-index">CH '+ch.num+'</div>'+
      '<div class="ch-body">'+
        '<div class="ch-name">HANDA – '+ch.name+'</div>'+
        '<div class="ch-meta">'+ch.cards.length+' cards</div>'+
      '</div>'+
      '<div class="ch-arrow">›</div>';
    b.onclick=()=>openChapter(i);
    chapterList.appendChild(b);
  });
}

function openChapter(i){
  chapIdx=i; idx=0;
  home.classList.add('hidden');
  deck.classList.remove('hidden');
  render();
}
function goHome(){
  deck.classList.add('hidden');
  home.classList.remove('hidden');
}

function render(){
  const ch=CHAPTERS[chapIdx];
  const c=ch.cards[idx];
  card.classList.remove('flipped');
  deckTitle.textContent='HANDA – '+ch.name;
  totalEl.textContent=ch.cards.length;
  curEl.textContent=idx+1;
  fillEl.style.width=((idx+1)/ch.cards.length*100)+'%';
  qnumEl.textContent='Q'+c.n;
  qtextEl.textContent=c.q;
  optsEl.innerHTML='';
  c.opts.forEach((o,i)=>{
    const li=document.createElement('li');
    li.className='opt';
    li.innerHTML='<span class="lbl">'+LETTERS[i]+'</span><span>'+o+'</span>';
    optsEl.appendChild(li);
  });
  badgeEl.textContent=LETTERS[c.a];
  ansTxt.textContent=c.opts[c.a];
  prevBtn.disabled=idx===0;
  nextBtn.textContent=idx===ch.cards.length-1?'Restart ↻':'Next ›';
}

function revealOnFlip(){
  const c=CHAPTERS[chapIdx].cards[idx];
  optsEl.querySelectorAll('.opt').forEach((li,i)=>li.classList.toggle('correct',i===c.a));
}

card.addEventListener('click',()=>{
  const flipping=!card.classList.contains('flipped');
  card.classList.toggle('flipped');
  if(flipping) revealOnFlip();
});
prevBtn.onclick=e=>{e.stopPropagation(); if(idx>0){idx--; notice.classList.add('hidden'); render();}};
nextBtn.onclick=e=>{e.stopPropagation(); const ch=CHAPTERS[chapIdx]; idx=idx<ch.cards.length-1?idx+1:0; notice.classList.add('hidden'); render();};
backBtn.onclick=()=>{notice.classList.add('hidden'); goHome();};

/* jump-to-question */
jumpBtn.onclick=()=>{jumpOverlay.classList.remove('hidden'); jumpErr.textContent=''; jumpInput.value=''; setTimeout(()=>jumpInput.focus(),50);};
document.getElementById('jumpCancel').onclick=()=>jumpOverlay.classList.add('hidden');
jumpOverlay.addEventListener('click',e=>{if(e.target===jumpOverlay) jumpOverlay.classList.add('hidden');});
function doJump(){
  const ch=CHAPTERS[chapIdx];
  const want=parseInt(jumpInput.value,10);
  if(isNaN(want)){jumpErr.textContent='Enter a number.';return;}
  // exact match?
  let pos=ch.cards.findIndex(c=>c.n===want);
  if(pos!==-1){
    idx=pos; notice.classList.add('hidden'); render();
    jumpOverlay.classList.add('hidden'); return;
  }
  // no exact match: find the next available question number
  let nextPos=ch.cards.findIndex(c=>c.n>want);
  if(nextPos===-1) nextPos=ch.cards.length-1; // past the end → last card
  idx=nextPos;
  render();
  notice.innerHTML='<span>Q<b>'+want+'</b> wasn\u2019t added (likely a calculation question). Showing the next one, Q<b>'+ch.cards[idx].n+'</b>.</span>';
  notice.classList.remove('hidden');
  jumpOverlay.classList.add('hidden');
}
document.getElementById('jumpGo').onclick=doJump;
jumpInput.addEventListener('keydown',e=>{if(e.key==='Enter') doJump();});

/* swipe */
const stage=document.querySelector('.stage');
let sx=0;
stage.addEventListener('touchstart',e=>sx=e.touches[0].clientX,{passive:true});
stage.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-sx;
  if(Math.abs(dx)<50) return;
  const ch=CHAPTERS[chapIdx];
  if(dx<0 && idx<ch.cards.length-1){idx++; notice.classList.add('hidden'); render();}
  if(dx>0 && idx>0){idx--; notice.classList.add('hidden'); render();}
});

buildHome();
</script>
</body>
</html>
